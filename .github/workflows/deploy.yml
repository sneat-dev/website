name: Deploy to Cloudflare

# Deploys sneat.dev on every push to main. Self-contained (no cross-org reusable
# workflow) so it runs regardless of the sneat-dev org Actions allowlist: only
# GitHub-authored actions (checkout, setup-node) plus `wrangler deploy` via the
# repo's own devDependency. Auth: CLOUDFLARE_API_TOKEN repo secret +
# CLOUDFLARE_ACCOUNT_ID repo variable (an identifier, not a secret).
#
# The apex sneat.dev is attached to the `sneat-dev-website` worker as a
# Cloudflare Custom Domain (managed out-of-band via the API), so a successful
# deploy publishes straight to production. www → apex is a zone Redirect Rule.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "src/**"
      - "tsconfig.json"
      - "wrangler.jsonc"
  pull_request:
    paths:
      - ".github/workflows/deploy.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "src/**"
      - "tsconfig.json"
      - "wrangler.jsonc"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build${{ github.event_name == 'push' && ' · deploy' || '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy (wrangler)
        if: github.event_name == 'push'
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        if: github.event_name == 'push'
        run: |
          set -e
          for path in / /products/ /specs/ /cli/ /codegrapher/ /workbench/ /og/default.png; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "https://sneat.dev${path}")
            echo "sneat.dev${path} -> ${code}"
            [ "$code" = "200" ] || { echo "::error::sneat.dev${path} returned ${code}"; exit 1; }
          done
