name: Deploy to Cloudflare

# Production-only workflow. Pull requests are validated by build.yml and never
# enter this workflow. Deploys sneat.dev on every relevant push to main.
# Self-contained (no cross-org reusable
# workflow) so it runs regardless of the sneat-dev org Actions allowlist: only
# GitHub-authored actions (checkout, setup-node) plus `wrangler deploy` via the
# repo's own devDependency. Auth: CLOUDFLARE_API_TOKEN repo secret +
# CLOUDFLARE_ACCOUNT_ID repo variable (an identifier, not a secret).
#
# The apex sneat.dev is attached to the `sneat-dev-website` worker as a
# Cloudflare Custom Domain (managed out-of-band via the API), so a successful
# deploy publishes straight to production. www → apex is a zone Redirect Rule.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "astro.config.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - "public/**"
      - "src/**"
      - "tsconfig.json"
      - "wrangler.jsonc"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy (wrangler)
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        run: |
          set -e
          for route in / /products/ /specs/ /cli/ /codegrapher/ /chatwright/ /rehearse/ /workbench/ /og/default.png; do
            code=000
            for attempt in {1..10}; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "https://sneat.dev${route}")
              echo "sneat.dev${route} -> ${code} (attempt ${attempt}/10)"
              if [ "$code" = "200" ]; then
                break
              fi
              if [ "$attempt" -lt 10 ]; then
                sleep 3
              fi
            done
            [ "$code" = "200" ] || { echo "::error::sneat.dev${route} returned ${code} after 10 attempts"; exit 1; }
          done
